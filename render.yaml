services:
  - type: web
    name: inventory-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    rootDir: backend

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
