services:
  - type: web
    name: inventory-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    rootDir: backend

  - type: web
    name: inventory-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://inventory-management-0y94.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
